<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    
    <!-- Glow gradient -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Inner shine -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Background glow -->
  <circle cx="200" cy="200" r="180" fill="url(#glowGrad)"/>
  
  <!-- Main rounded square -->
  <rect x="50" y="50" width="300" height="300" rx="60" fill="url(#mainGrad)"/>
  
  <!-- Inner shine overlay -->
  <rect x="60" y="60" width="280" height="140" rx="40" fill="url(#shineGrad)"/>
  
  <!-- Database cylinder - simplified -->
  <g transform="translate(100, 100)">
    <!-- Top of cylinder -->
    <ellipse cx="100" cy="30" rx="70" ry="20" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.9"/>
    
    <!-- Cylinder sides -->
    <path d="M30 30 L30 170 Q30 190 100 190 Q170 190 170 170 L170 30" 
          fill="none" stroke="#ffffff" stroke-width="8" opacity="0.8"/>
    
    <!-- Middle curve -->
    <ellipse cx="100" cy="100" rx="70" ry="20" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.6"/>
    
    <!-- Bottom curve -->
    <ellipse cx="100" cy="170" rx="70" ry="20" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.4"/>
  </g>
  
  <!-- "J" letter for JunifyDB - stylized -->
  <g transform="translate(105, 220)">
    <text x="90" y="70" font-family="'Inter', 'Segoe UI', Arial, sans-serif" 
          font-size="110" font-weight="800" fill="#ffffff" text-anchor="middle">
      J
    </text>
  </g>
  
  <!-- Decorative ring -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="#a78bfa" stroke-width="3" stroke-dasharray="20 10" opacity="0.5"/>
  
  <!-- Corner accents -->
  <circle cx="80" cy="80" r="12" fill="#ffffff" opacity="0.8"/>
  <circle cx="320" cy="80" r="12" fill="#ffffff" opacity="0.8"/>
  <circle cx="80" cy="320" r="12" fill="#ffffff" opacity="0.8"/>
  <circle cx="320" cy="320" r="12" fill="#ffffff" opacity="0.8"/>
</svg>