<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Database layers -->
  <g transform="translate(106, 120)">
    <!-- Top ellipse -->
    <ellipse cx="150" cy="40" rx="100" ry="35" fill="none" stroke="white" stroke-width="12" opacity="0.9"/>
    
    <!-- Cylinder body -->
    <path d="M50 40 L50 220 Q50 255 150 255 Q250 255 250 220 L250 40" 
          fill="none" stroke="white" stroke-width="12" opacity="0.9"/>
    
    <!-- Middle ellipse -->
    <ellipse cx="150" cy="120" rx="100" ry="35" fill="none" stroke="white" stroke-width="12" opacity="0.7"/>
    
    <!-- Bottom ellipse -->
    <ellipse cx="150" cy="200" rx="100" ry="35" fill="none" stroke="white" stroke-width="12" opacity="0.5"/>
  </g>
  
  <!-- "DB" text -->
  <g transform="translate(155, 280)" filter="url(#glow)">
    <text x="0" y="80" font-family="'Segoe UI', Arial, sans-serif" 
          font-size="140" font-weight="bold" fill="url(#textGrad)" text-anchor="middle">
      DB
    </text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="400" cy="100" r="20" fill="#818cf8" opacity="0.8"/>
  <circle cx="420" cy="140" r="12" fill="#818cf8" opacity="0.6"/>
  <circle cx="390" cy="160" r="8" fill="#818cf8" opacity="0.4"/>
  
  <!-- Bottom accent line -->
  <rect x="100" y="450" width="312" height="8" rx="4" fill="#818cf8" opacity="0.6"/>
</svg>