<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNoSQL-EMBED Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: #16213e; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #00d9ff; }
        .status { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #00ff00; }
        .status-dot.offline { background: #ff4444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #16213e; border-radius: 10px; padding: 20px; }
        .card h2 { color: #00d9ff; margin-bottom: 15px; font-size: 1.1rem; }
        .metric { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #0f3460; }
        .metric:last-child { border-bottom: none; }
        .metric-value { color: #00d9ff; font-weight: bold; }
        .btn { background: #00d9ff; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #00b8d4; }
        .btn-danger { background: #ff4444; }
        .btn-danger:hover { background: #cc0000; }
        input, select, textarea { width: 100%; background: #0f3460; border: 1px solid #16213e; color: #fff; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        textarea { min-height: 100px; resize: vertical; }
        .log { background: #0f3460; padding: 10px; border-radius: 5px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.9rem; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid #16213e; }
        .log-entry.error { color: #ff4444; }
        .log-entry.success { color: #00ff00; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { color: #00d9ff; }
        .actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab button { background: #0f3460; color: #fff; border: none; padding: 10px 20px; border-radius: 5px 5px 0 0; cursor: pointer; }
        .tab button.active { background: #16213e; color: #00d9ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>JNoSQL-EMBED Dashboard</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </header>

        <div class="tab">
            <button class="active" onclick="showTab('overview')">Overview</button>
            <button onclick="showTab('collections')">Collections</button>
            <button onclick="showTab('kv')">Key-Value</button>
            <button onclick="showTab('query')">Query</button>
            <button onclick="showTab('logs')">Logs</button>
        </div>

        <div id="overview" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h2>System Metrics</h2>
                    <div class="metric"><span>Inserts</span><span class="metric-value" id="metricInserts">-</span></div>
                    <div class="metric"><span>Reads</span><span class="metric-value" id="metricReads">-</span></div>
                    <div class="metric"><span>Updates</span><span class="metric-value" id="metricUpdates">-</span></div>
                    <div class="metric"><span>Deletes</span><span class="metric-value" id="metricDeletes">-</span></div>
                    <div class="metric"><span>Queries</span><span class="metric-value" id="metricQueries">-</span></div>
                </div>
                <div class="card">
                    <h2>Transactions</h2>
                    <div class="metric"><span>Committed</span><span class="metric-value" id="metricCommitted">-</span></div>
                    <div class="metric"><span>Rolled Back</span><span class="metric-value" id="metricRolledBack">-</span></div>
                </div>
                <div class="card">
                    <h2>Memory</h2>
                    <div class="metric"><span>Total</span><span class="metric-value" id="memTotal">-</span></div>
                    <div class="metric"><span>Used</span><span class="metric-value" id="memUsed">-</span></div>
                    <div class="metric"><span>Free</span><span class="metric-value" id="memFree">-</span></div>
                    <div class="metric"><span>Max</span><span class="metric-value" id="memMax">-</span></div>
                </div>
                <div class="card">
                    <h2>Database</h2>
                    <div class="metric"><span>Engine</span><span class="metric-value" id="dbEngine">-</span></div>
                    <div class="metric"><span>Status</span><span class="metric-value" id="dbStatus">-</span></div>
                    <div class="metric"><span>Threads</span><span class="metric-value" id="dbThreads">-</span></div>
                </div>
            </div>
        </div>

        <div id="collections" class="tab-content">
            <div class="card">
                <h2>Create Document</h2>
                <input type="text" id="colName" placeholder="Collection name">
                <textarea id="docJson" placeholder='{"name":"Alice","age":30}'></textarea>
                <button class="btn" onclick="createDocument()">Create</button>
            </div>
            <div class="card" style="margin-top: 20px;">
                <h2>Query Documents</h2>
                <input type="text" id="queryColName" placeholder="Collection name">
                <button class="btn" onclick="loadDocuments()">Load All</button>
                <div id="docsTable" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div id="kv" class="tab-content">
            <div class="card">
                <h2>Key-Value Operations</h2>
                <input type="text" id="bucketName" placeholder="Bucket name">
                <input type="text" id="kvKey" placeholder="Key">
                <input type="text" id="kvValue" placeholder="Value">
                <div class="actions">
                    <button class="btn" onclick="kvPut()">Put</button>
                    <button class="btn" onclick="kvGet()">Get</button>
                    <button class="btn btn-danger" onclick="kvDelete()">Delete</button>
                </div>
                <div id="kvResult" class="log" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div id="query" class="tab-content">
            <div class="card">
                <h2>Query Builder</h2>
                <input type="text" id="queryCol" placeholder="Collection name">
                <select id="queryOp">
                    <option value="eq">Equals (=)</option>
                    <option value="gt">Greater Than (>)</option>
                    <option value="gte">Greater or Equal (>=)</option>
                    <option value="lt">Less Than (<)</option>
                    <option value="lte">Less or Equal (<=)</option>
                    <option value="ne">Not Equals (!=)</option>
                </select>
                <input type="text" id="queryField" placeholder="Field name">
                <input type="text" id="queryValue" placeholder="Value">
                <button class="btn" onclick="executeQuery()">Execute Query</button>
                <div id="queryResult" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div id="logs" class="tab-content">
            <div class="card">
                <h2>Activity Log</h2>
                <button class="btn" onclick="clearLogs()">Clear</button>
                <div id="activityLog" class="log" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080/api';
        let logs = [];

        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab button').forEach(el => el.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.target.classList.add('active');
        }

        async function fetchJSON(url, options = {}) {
            try {
                const res = await fetch(url, options);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (e) {
                log(e.message, 'error');
                return null;
            }
        }

        function log(msg, type = 'info') {
            logs.unshift({ time: new Date().toLocaleTimeString(), msg, type });
            if (logs.length > 100) logs.pop();
            renderLogs();
        }

        function renderLogs() {
            document.getElementById('activityLog').innerHTML = logs.map(l =>
                `<div class="log-entry ${l.type}">[${l.time}] ${l.msg}</div>`
            ).join('');
        }

        async function checkHealth() {
            const health = await fetchJSON(`${API}/health`);
            if (health && health.open) {
                document.getElementById('statusDot').classList.remove('offline');
                document.getElementById('statusText').textContent = 'Online';
                log('Connected to database', 'success');
            } else {
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusText').textContent = 'Offline';
            }
        }

        async function loadMetrics() {
            const m = await fetchJSON(`${API}/metrics`);
            if (m) {
                document.getElementById('metricInserts').textContent = m.inserts || 0;
                document.getElementById('metricReads').textContent = m.reads || 0;
                document.getElementById('metricUpdates').textContent = m.updates || 0;
                document.getElementById('metricDeletes').textContent = m.deletes || 0;
                document.getElementById('metricQueries').textContent = m.queries || 0;
                document.getElementById('metricCommitted').textContent = m.transactionsCommitted || 0;
                document.getElementById('metricRolledBack').textContent = m.transactionsRolledBack || 0;
            }
        }

        async function loadStats() {
            const s = await fetchJSON(`${API}/stats`);
            if (s) {
                document.getElementById('dbEngine').textContent = s.database?.engine || '-';
                document.getElementById('dbStatus').textContent = s.database?.open ? 'Open' : 'Closed';
                document.getElementById('dbThreads').textContent = s.threads?.activeCount || '-';
                const fmt = n => n ? (n / 1024 / 1024).toFixed(1) + ' MB' : '-';
                document.getElementById('memTotal').textContent = fmt(s.memory?.totalMemory);
                document.getElementById('memUsed').textContent = fmt(s.memory?.usedMemory);
                document.getElementById('memFree').textContent = fmt(s.memory?.freeMemory);
                document.getElementById('memMax').textContent = fmt(s.memory?.maxMemory);
            }
        }

        async function createDocument() {
            const col = document.getElementById('colName').value;
            const json = document.getElementById('docJson').value;
            if (!col || !json) { log('Collection and document JSON required', 'error'); return; }
            try {
                const doc = JSON.parse(json);
                const result = await fetchJSON(`${API}/collections/${col}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: json
                });
                if (result) { log(`Created document in ${col}`, 'success'); loadMetrics(); }
            } catch (e) { log('Invalid JSON: ' + e.message, 'error'); }
        }

        async function loadDocuments() {
            const col = document.getElementById('queryColName').value;
            if (!col) { log('Collection name required', 'error'); return; }
            const docs = await fetchJSON(`${API}/collections/${col}`);
            if (docs) {
                if (Array.isArray(docs) && docs.length > 0) {
                    document.getElementById('docsTable').innerHTML = `
                        <table><tr><th>ID</th><th>Data</th></tr>
                        ${docs.map(d => `<tr><td>${d.id || '-'}</td><td>${JSON.stringify(d.fields || d)}</td></tr>`).join('')}
                        </table>`;
                    log(`Loaded ${docs.length} documents from ${col}`, 'success');
                } else {
                    document.getElementById('docsTable').innerHTML = '<p>No documents found</p>';
                }
            }
        }

        async function kvPut() {
            const bucket = document.getElementById('bucketName').value;
            const key = document.getElementById('kvKey').value;
            const value = document.getElementById('kvValue').value;
            if (!bucket || !key) { log('Bucket and key required', 'error'); return; }
            const result = await fetchJSON(`${API}/kv/${bucket}/${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ value })
            });
            if (result) { log(`Put: ${key} = ${value}`, 'success'); }
        }

        async function kvGet() {
            const bucket = document.getElementById('bucketName').value;
            const key = document.getElementById('kvKey').value;
            if (!bucket || !key) { log('Bucket and key required', 'error'); return; }
            const result = await fetchJSON(`${API}/kv/${bucket}/${key}`);
            if (result) { log(`Get: ${key} = ${result.value}`, 'success'); }
        }

        async function kvDelete() {
            const bucket = document.getElementById('bucketName').value;
            const key = document.getElementById('kvKey').value;
            if (!bucket || !key) { log('Bucket and key required', 'error'); return; }
            await fetch(`${API}/kv/${bucket}/${key}`, { method: 'DELETE' });
            log(`Deleted: ${key}`, 'success');
        }

        function executeQuery() {
            log('Query functionality requires query parameters - use REST API directly', 'info');
        }

        function clearLogs() { logs = []; renderLogs(); }

        // Initialize
        checkHealth();
        loadMetrics();
        loadStats();
        setInterval(() => { checkHealth(); loadMetrics(); loadStats(); }, 5000);
    </script>
</body>
</html>
